name: Update Release Version

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Get Release Metadata
        id: meta
        run: |
          run: |
          # 1. Get the Tag Name
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            # Fallback for manual runs: get the latest tag from git
            TAG_NAME=$(git describe --tags --abbrev=0)
          fi

          # 2. Strip the 'v' for the VERSION output
          VERSION=${TAG_NAME#v}
          
          # 3. Get the SHA of that tag
          SHA=$(git rev-parse $TAG_NAME)

          # 4. Save to outputs
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SHA=$SHA" >> $GITHUB_OUTPUT
          echo "TAG=$TAG_NAME" >> $GITHUB_OUTPUT
          
          # Debugging: This will show up in your Action logs so you can verify
          echo "Processing Tag: $TAG_NAME (Version: $VERSION, SHA: $SHA)"

      - name: Update pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.meta.outputs.VERSION }}\"/" pyproject.toml

      - name: Update README.md
        run: |
          # Matches: uses: jmertic/lfx-landscape-tools@[anything] # [anything]
          # Replaces with the new SHA and current date
          sed -i "s|uses: jmertic/lfx-landscape-tools@.* # .*|uses: jmertic/lfx-landscape-tools@${{ steps.meta.outputs.SHA }} # ${{ steps.meta.outputs.VERSION }}|" README.md

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: release ${{ steps.meta.outputs.VERSION }}"
          base: main # Explicitly target the protected branch
          branch: "release-updates-${{ steps.meta.outputs.VERSION }}"
          title: "Release Updates for ${{ steps.meta.outputs.VERSION }}"
          signoff: true
          body: |
            Automated version updates for release ${{ steps.meta.outputs.VERSION }}.
            - Updated pyproject.toml
            - Updated README.md SHA and Date
          labels: |
            automated-pr
            release
      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-number != ''
        shell: bash
        run: |
          if [ "$(gh api repos/lfx-landscape-tools --jq '.allow_auto_merge')" = "true" ]; then
            gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}" \
            || gh pr merge --squash "${{ steps.cpr.outputs.pull-request-number }}"
          fi
