name: Update Release Version

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Get the full history so we can find the commit SHA
          fetch-depth: 0

      - name: Get Release Metadata
        id: meta
        run: |
          # Get the version without the 'v'
          VERSION=${{ github.event.release.tag_name }}
          echo "VERSION=${VERSION#v}" >> $GITHUB_OUTPUT
          
          # Get the SHA associated with the release tag
          echo "SHA=$(git rev-parse ${{ github.event.release.tag_name }})" >> $GITHUB_OUTPUT

      - name: Update pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.meta.outputs.VERSION }}\"/" pyproject.toml

      - name: Update README.md
        run: |
          # Matches: uses: jmertic/lfx-landscape-tools@[anything] # [anything]
          # Replaces with the new SHA and current date
          sed -i "s|uses: jmertic/lfx-landscape-tools@.* # .*|uses: jmertic/lfx-landscape-tools@${{ steps.meta.outputs.SHA }} # ${{ steps.meta.outputs.VERSION }}|" README.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: release ${{ steps.meta.outputs.VERSION }}"
          base: main # Explicitly target the protected branch
          branch: "release-updates-${{ steps.meta.outputs.VERSION }}"
          title: "Release Updates for ${{ steps.meta.outputs.VERSION }}"
          body: |
            Automated version updates for release ${{ steps.meta.outputs.VERSION }}.
            - Updated pyproject.toml
            - Updated README.md SHA and Date
          labels: |
            automated-pr
            release
